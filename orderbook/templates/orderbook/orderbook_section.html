<!-- Order Book Section (included from orderbook app) -->
<div id="orderbookSection" style="display: none;">
    <div class="ob-card" id="orderbookCard">
        <div class="ob-card-header">
            <div class="ob-title-area">
                <span class="ob-section-title">📊 Order Book Depth</span>
                <span class="ob-status" id="depthStatus">—</span>
            </div>
            <div class="sentiment-gauge loading" id="obConsensus">
                <span class="sentiment-gauge-icon" id="obConsensusIcon">⏳</span>
                <span id="obConsensusLabel">Loading...</span>
            </div>
        </div>

        <!-- Price Summary Row -->
        <div class="ob-price-row">
            <div class="ob-price-block">
                <span class="ob-mini-label">Best Bid</span>
                <span class="ob-best-bid" id="bestBidDisplay">—</span>
            </div>
            <div class="ob-spread-block">
                <span class="ob-mini-label">Spread</span>
                <span class="ob-spread-val" id="spreadValue">—</span>
                <span class="ob-spread-pct" id="spreadPct">—</span>
            </div>
            <div class="ob-price-block right">
                <span class="ob-mini-label">Best Ask</span>
                <span class="ob-best-ask" id="bestAskDisplay">—</span>
            </div>
        </div>

        <!-- Imbalance Gauge -->
        <div class="ob-gauge-section">
            <div class="ob-gauge-header">
                <span class="ob-mini-label">Order Book Imbalance</span>
                <span class="ob-imbalance-pct" id="imbalancePct">—</span>
            </div>
            <div class="ob-gauge-track">
                <div class="ob-gauge-bar" id="imbalanceBar">
                    <div class="ob-gauge-indicator" id="imbalanceIndicator" style="left: 50%;"></div>
                </div>
                <div class="ob-gauge-labels">
                    <span>🔴 Sell Pressure</span>
                    <span>🟢 Buy Pressure</span>
                </div>
            </div>
            <div class="ob-gauge-verdict" id="imbalanceVerdict">
                <span class="ob-verdict-dot" id="verdictDot"></span>
                <span id="verdictText">Waiting for data...</span>
            </div>
        </div>

        <!-- Volume Summary Footer -->
        <div class="ob-volume-footer" id="depthFooter" style="display:none;">
            <div class="ob-vol-row">
                <span class="ob-vol-label">Ask Vol</span>
                <span class="ob-vol-num ask" id="totalAskVol">—</span>
                <span class="ob-vol-divider">|</span>
                <span class="ob-vol-num bid" id="totalBidVol">—</span>
                <span class="ob-vol-label">Bid Vol</span>
            </div>
            <div class="ob-vol-row ob-vol-sub">
                <span>Ratio: <span id="bidAskRatio">—</span></span>
                <span id="depthLevels">— levels</span>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // Order Book Module — compact overview with imbalance gauge
    // ============================================================
    let orderbook = {
        depthWs: null,
        symbol: null,
        reconnectTimer: null,
        maxRows: 20,
        bestAsk: null,
        bestBid: null,
        depthCache: { bids: {}, asks: {} },
        depthRenderPending: false,
        prevImbalance: null,
    };

    const depthCache = orderbook.depthCache;

    /**
     * Initialize (or re-initialize) the order book for a given symbol.
     * Called from charts page's selectPair().
     */
    function initOrderBook(symbol) {
        if (orderbook.depthWs) {
            orderbook.depthWs.close();
            orderbook.depthWs = null;
        }
        if (orderbook.reconnectTimer) {
            clearTimeout(orderbook.reconnectTimer);
            orderbook.reconnectTimer = null;
        }

        orderbook.symbol = symbol;
        orderbook.depthCache.bids = {};
        orderbook.depthCache.asks = {};

        const section = document.getElementById('orderbookSection');
        if (section) section.style.display = 'block';

        // Reset display
        document.getElementById('bestBidDisplay').textContent = '—';
        document.getElementById('bestAskDisplay').textContent = '—';
        document.getElementById('spreadValue').textContent = '—';
        document.getElementById('spreadPct').textContent = '—';
        document.getElementById('imbalancePct').textContent = '—';
        document.getElementById('totalAskVol').textContent = '—';
        document.getElementById('totalBidVol').textContent = '—';
        document.getElementById('bidAskRatio').textContent = '—';
        document.getElementById('depthLevels').textContent = '— levels';
        document.getElementById('depthFooter').style.display = 'none';
        setConsensus('loading', '⏳', 'Loading...');
        setVerdict('neutral', 'Waiting for data...');
        document.getElementById('depthStatus').textContent = 'Connecting...';
        document.getElementById('depthStatus').className = 'ob-status disconnected';

        fetchInitialDepth(symbol);
        connectDepthWs(symbol);
    }

    // ── REST Snapshot ───────────────────────────────────────────
    async function fetchInitialDepth(symbol) {
        try {
            const resp = await fetch(`/orderbook/depth/?symbol=${symbol}&limit=${orderbook.maxRows}`);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const data = await resp.json();
            if (data.error) throw new Error(data.error);
            renderOverview(data);
        } catch (err) {
            console.error('Order book fetch error:', err);
        }
    }

    // ── WebSocket Connection ────────────────────────────────────
    function connectDepthWs(symbol) {
        if (orderbook.depthWs) orderbook.depthWs.close();

        const url = `wss://stream.binance.com:9443/ws/${symbol}@depth20@100ms`;
        orderbook.depthWs = new WebSocket(url);

        orderbook.depthWs.onopen = () => {
            document.getElementById('depthStatus').textContent = '● Live';
            document.getElementById('depthStatus').className = 'ob-status connected';
        };

        orderbook.depthWs.onmessage = (event) => {
            try {
                const data = JSON.parse(event.data);
                updateDepthFromWs(data);
            } catch (err) {
                console.error('Depth WS error:', err);
            }
        };

        orderbook.depthWs.onerror = () => {
            document.getElementById('depthStatus').textContent = 'Error';
            document.getElementById('depthStatus').className = 'ob-status disconnected';
        };

        orderbook.depthWs.onclose = () => {
            document.getElementById('depthStatus').textContent = 'Disconnected';
            document.getElementById('depthStatus').className = 'ob-status disconnected';
            if (orderbook.symbol === symbol) {
                orderbook.reconnectTimer = setTimeout(() => connectDepthWs(symbol), 3000);
            }
        };
    }

    // ── WebSocket Update Handler ────────────────────────────────
    function updateDepthFromWs(data) {
        // @depth20@100ms sends bids/asks fields (not b/a)
        const bids = data.bids || data.b || [];
        const asks = data.asks || data.a || [];

        if (bids.length === 0 && asks.length === 0) return;

        // Update bid cache
        for (const [price, qty] of bids) {
            const q = parseFloat(qty);
            if (q === 0) delete depthCache.bids[price];
            else depthCache.bids[price] = q;
        }

        // Update ask cache
        for (const [price, qty] of asks) {
            const q = parseFloat(qty);
            if (q === 0) delete depthCache.asks[price];
            else depthCache.asks[price] = q;
        }

        if (!orderbook.depthRenderPending) {
            orderbook.depthRenderPending = true;
            requestAnimationFrame(() => {
                renderFromCache();
                orderbook.depthRenderPending = false;
            });
        }
    }

    function renderFromCache() {
        // Keys are strings from Binance (e.g. "74038.46000000"); keep as strings for cache lookup,
        // but convert to numbers for the data array passed to renderOverview.
        const askKeys = Object.keys(depthCache.asks)
            .sort((a, b) => parseFloat(a) - parseFloat(b))
            .slice(0, orderbook.maxRows);
        const asks = askKeys.map(k => [parseFloat(k), depthCache.asks[k]]);

        const bidKeys = Object.keys(depthCache.bids)
            .sort((a, b) => parseFloat(b) - parseFloat(a))
            .slice(0, orderbook.maxRows);
        const bids = bidKeys.map(k => [parseFloat(k), depthCache.bids[k]]);

        renderOverview({ asks, bids });
    }

    // ── Render Overview ─────────────────────────────────────────
    function renderOverview(data) {
        const asks = data.asks || [];
        const bids = data.bids || [];
        if (asks.length === 0 && bids.length === 0) return;

        // Best bid/ask
        orderbook.bestAsk = asks[0]?.[0] || null;
        orderbook.bestBid = bids[0]?.[0] || null;

        // Totals
        const totalAskVol = asks.reduce((sum, [, q]) => sum + q, 0);
        const totalBidVol = bids.reduce((sum, [, q]) => sum + q, 0);
        const totalVol = totalAskVol + totalBidVol;

        // Imbalance: bid proportion (0-100%)
        const bidPct = totalVol > 0 ? (totalBidVol / totalVol) * 100 : 50;
        const askPct = 100 - bidPct;

        // Update best bid/ask and spread
        if (orderbook.bestBid && orderbook.bestAsk) {
            const spread = orderbook.bestAsk - orderbook.bestBid;
            const spreadPct = (spread / orderbook.bestAsk) * 100;

            document.getElementById('bestBidDisplay').textContent = formatPrice(orderbook.bestBid);
            document.getElementById('bestAskDisplay').textContent = formatPrice(orderbook.bestAsk);
            document.getElementById('spreadValue').textContent = formatPrice(spread);
            document.getElementById('spreadPct').textContent = `(${spreadPct.toFixed(3)}%)`;
        }

        // Update imbalance display
        document.getElementById('imbalancePct').textContent = `${bidPct.toFixed(1)}% Buy / ${askPct.toFixed(1)}% Sell`;

        // Move gauge indicator
        const indicator = document.getElementById('imbalanceIndicator');
        // Map: 0% bid = extreme sell (left=5%), 100% bid = extreme buy (right=95%)
        const leftPct = 5 + (bidPct / 100) * 90;
        indicator.style.left = `${leftPct}%`;

        // Determine consensus
        let consensus, icon, label;
        if (bidPct > 58) {
            consensus = 'bullish';
            icon = '🚀';
            label = 'Bullish';
        } else if (bidPct < 42) {
            consensus = 'bearish';
            icon = '🔻';
            label = 'Bearish';
        } else {
            consensus = 'neutral';
            icon = '➖';
            label = 'Neutral';
        }
        setConsensus(consensus, icon, label);

        // Verdict text
        const verdictPct = Math.abs(bidPct - 50);
        let verdictText;
        if (consensus === 'bullish') {
            verdictText = `Strong buy pressure — ${verdictPct.toFixed(1)}% more bids than asks`;
        } else if (consensus === 'bearish') {
            verdictText = `Strong sell pressure — ${verdictPct.toFixed(1)}% more asks than bids`;
        } else {
            verdictText = 'Book is balanced — no clear pressure';
        }
        setVerdict(consensus, verdictText);

        // Flash effect on directional change
        const card = document.getElementById('orderbookCard');
        const now = bidPct > 50 ? 'buy' : 'sell';
        if (orderbook.prevImbalance && orderbook.prevImbalance !== now) {
            card.classList.remove('ob-flash-up', 'ob-flash-down');
            void card.offsetWidth;
            card.classList.add(now === 'buy' ? 'ob-flash-up' : 'ob-flash-down');
        }
        orderbook.prevImbalance = now;

        // Volume footer
        document.getElementById('depthFooter').style.display = 'block';
        document.getElementById('totalAskVol').textContent = formatVolume(totalAskVol);
        document.getElementById('totalBidVol').textContent = formatVolume(totalBidVol);
        const ratio = totalBidVol > 0 ? (totalAskVol / totalBidVol).toFixed(2) : '∞';
            document.getElementById('bidAskRatio').textContent = `1:${ratio}`;
        document.getElementById('depthLevels').textContent = `${Math.max(asks.length, bids.length)} levels`;
    }

    // ── Consensus helpers ───────────────────────────────────────
    function setConsensus(sentiment, icon, label) {
        const el = document.getElementById('obConsensus');
        el.className = `sentiment-gauge ${sentiment}`;
        document.getElementById('obConsensusIcon').textContent = icon;
        document.getElementById('obConsensusLabel').textContent = label;
    }

    function setVerdict(sentiment, text) {
        const el = document.getElementById('imbalanceVerdict');
        el.className = `ob-gauge-verdict ${sentiment}`;
        const dot = document.getElementById('verdictDot');
        dot.className = `ob-verdict-dot ${sentiment}`;
        document.getElementById('verdictText').textContent = text;
    }
</script>
